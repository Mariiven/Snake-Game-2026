<!DOCTYPE html>
<html lang="pt-br">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Jogo da Cobrinha</title>
      <style>
        
        .container {
          text-align: center;
          background-color: white;
          padding: 30px;
          border-radius: 20px;
          box-shadow: 0px 10px 30px black;
        }

        .info {
          font-size: 1em;
        }

        .pontuacao{
          font-weight: bold;
          color: #28a745;
        }

        .recorde{
          font-weight: bold;
          color: #a7072f;
        }

        #canvas{
            border: 3px solid #333;
            border-radius: 10px;
            background-color: #F0F0F0;
            display: block;
            margin: 20px auto;
            box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.2);
        }

        .controles{
          margin-top: 20px;
        }
        
        button{
          
          font-size: 16px;
          cursor: pointer;
          background-color: #28A745;
          padding: 12px 25px;
          color: white;
          border: none;
          border-radius: 8px;
          margin: 5px;
          transition: all 0.3s ease;
        }

        .teclas{
          display: grid;
          grid-template-columns: repeat(3, 50px);
          gap: 5px;
          justify-content: center;
          margin: 15px auto;
        }

        .tecla{
          width: 50px;
          height: 50px;
          background-color: #667eea;
          color: #F0F0F0;
          border: none;
        }

      </style>
  </head>
  
  <body>

    <div class="container">
        <h1>&#128013; Jogo da Cobrinha &#128013;</h1>

        <div class="info">
             <div class="pontuacao">
               Pontução: <span id="pontos"> 0 </span>
             </div>

             <div class="recorde">
                   Recorde: <span id="recorde"> 0 </span>
             </div>

             <canvas id="canvas" width="400" height="400">
             </canvas>

             <div class="controles">
       
              <button onclick="iniciarJogo()">Iniciar Jogo</button>

              <button onclick="pausarJogo()">Pausar / Continuar</button>

             </div>

             <div class="teclas">

              <div class="tecla vazia"></div>

              <div class="tecla">&#9650;</div>

              <div class="tecla vazia"></div>

              <div class="tecla">&#9668;</div>
              <div class="tecla">&#9660;</div>
              <div class="tecla">&#9658;</div>

             </div>
        </div>
    </div>
    <script>
      function iniciarJogo(){
        console.log('Jogo Começou!');
      }

      function pausarJogo(){
        console.log('Pausa no Jogo!');
      }
    </script>
  </body>
</html>
