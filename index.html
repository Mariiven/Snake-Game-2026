<!DOCTYPE html>
<html lang="pt-br">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Jogo da Cobrinha</title>
      <style>
        
        .container {
          text-align: center;
          background-color: white;
          padding: 30px;
          border-radius: 20px;
          box-shadow: 0px 10px 30px black;
        }

        .info {
          font-size: 1em;
        }

        .pontuacao{
          font-weight: bold;
          color: #28a745;
        }

        .recorde{
          font-weight: bold;
          color: #a7072f;
        }

        #canvas{
            border: 3px solid #333;
            border-radius: 10px;
            background-color: #F0F0F0;
            display: block;
            margin: 20px auto;
            box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.2)
        }

      </style>
  </head>
  
  <body>

    <div class="container">
        <h1>&#128013; Jogo da Cobrinha &#128013;</h1>

        <div class="info">
             <div class="pontuacao">
               Pontução: <span id="pontos"> 0 </span>
             </div>

             <div class="recorde">
                   Recorde: <span id="recorde"> 0 </span>
             </div>
             <canvas id="canvas" width="400" height="400">

             </canvas>
        </div>
    </div>
    
  </body>
</html>
